name = "midnight-expert"
description = "An end-to-end toolkit for building on the Midnight blockchain: writing, auditing, and mechanically verifying Compact smart contracts, developing DApps and wallets, and running the supporting node, indexer, and proof-server infrastructure. For developers working with Compact and the Midnight SDK."
version = "0.50.1"

